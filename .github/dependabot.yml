version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # Batch dev dependency updates (types, linting, testing)
      dev-dependencies:
        dependency-type: development
        patterns:
          - "@types/*"
          - "eslint*"
          - "vitest*"
          - "@testing-library/*"
          - "prettier*"
          - "typescript"
      # Batch Electron ecosystem updates
      electron:
        patterns:
          - "electron"
          - "electron-*"
      # Batch UI library updates
      ui-libraries:
        patterns:
          - "@radix-ui/*"
          - "lucide-react"
          - "framer-motion"
          - "tailwindcss"
          - "@tailwindcss/*"
      # Batch CodeMirror updates
      codemirror:
        patterns:
          - "@codemirror/*"
          - "@uiw/react-codemirror"
          - "@lezer/*"
    # Auto-merge patch and minor updates when CI passes
    # (major bumps still require manual review)
    ignore:
      # Don't auto-bump Electron majors — breaking changes likely
      - dependency-name: "electron"
        update-types: ["version-update:semver-major"]
      - dependency-name: "electron-builder"
        update-types: ["version-update:semver-major"]

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
