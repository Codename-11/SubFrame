<svg width="256" height="256" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="ge" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="4" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
    <filter id="gn" x="-300%" y="-300%" width="700%" height="700%"><feGaussianBlur stdDeviation="8" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
    <filter id="gf" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="2" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
    <radialGradient id="ag"><stop offset="0%" stop-color="rgba(255,110,180,0.25)"/><stop offset="50%" stop-color="rgba(180,128,255,0.08)"/><stop offset="100%" stop-color="transparent"/></radialGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#b480ff" stop-opacity="0.6"/><stop offset="50%" stop-color="#ff6eb4" stop-opacity="0.5"/><stop offset="100%" stop-color="#64d8ff" stop-opacity="0.6"/></linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" rx="28" ry="28" fill="#0f0f10"/>
  <!-- Ambient glow -->
  <circle cx="90" cy="90" r="44" fill="url(#ag)"/>
  <!-- Orbit 1: Purple -->
  <g transform="rotate(0,90,90)">
    <ellipse cx="90" cy="90" rx="58" ry="22" fill="none" stroke="rgba(180,128,255,0.35)" stroke-width="2"/>
    <circle cx="148" cy="90" r="4" fill="#b480ff" filter="url(#ge)"/>
  </g>
  <!-- Orbit 2: Pink (dashed) -->
  <g transform="rotate(60,90,90)">
    <ellipse cx="90" cy="90" rx="58" ry="22" fill="none" stroke="rgba(255,110,180,0.3)" stroke-width="2" stroke-dasharray="5 3.5"/>
    <circle cx="61" cy="79" r="4" fill="#ff6eb4" filter="url(#ge)"/>
  </g>
  <!-- Orbit 3: Cyan -->
  <g transform="rotate(120,90,90)">
    <ellipse cx="90" cy="90" rx="58" ry="22" fill="none" stroke="rgba(100,216,255,0.28)" stroke-width="2"/>
    <circle cx="61" cy="101" r="4" fill="#64d8ff" filter="url(#ge)"/>
  </g>
  <!-- Nucleus -->
  <circle cx="90" cy="90" r="6" fill="#ff6eb4" filter="url(#gn)"/>
  <!-- Frame outline -->
  <rect x="10" y="10" width="160" height="160" rx="14" ry="14" fill="none" stroke="url(#fg)" stroke-width="2" filter="url(#gf)"/>
</svg>
