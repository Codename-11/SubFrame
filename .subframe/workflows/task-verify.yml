# @subframe-version 0.7.0-beta
# @subframe-managed
name: task-verify
on:
  manual: true

jobs:
  verify:
    name: Task Verification
    steps:
      - name: Run Tests
        uses: test
      - name: Verify Implementation
        uses: critique
        require-approval: if_patches
        with:
          max-turns: 25
      - name: Generate Summary
        uses: describe
