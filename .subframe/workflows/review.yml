# @subframe-version 0.5.1-beta
# @subframe-managed
name: review
on:
  push:
    branches: ['*']
  manual: true

jobs:
  quality:
    name: Quality Checks
    steps:
      - name: Lint
        uses: lint
      - name: Test
        uses: test
        continue-on-error: true

  review:
    name: Code Review
    needs: [quality]
    steps:
      - name: Describe Changes
        uses: describe
      - name: Code Review
        uses: critique
        require-approval: if_patches
        with:
          max-turns: 25
      - name: Freeze
        uses: freeze

  publish:
    name: Publish
    needs: [review]
    steps:
      - name: Push
        uses: push
      - name: Create PR
        uses: create-pr
