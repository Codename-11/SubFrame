# @subframe-version 0.7.0-beta
# @subframe-managed
name: health-check
on:
  manual: true

jobs:
  audit:
    name: Project Audit
    steps:
      - name: Lint Check
        uses: lint
        continue-on-error: true
      - name: Test Suite
        uses: test
        continue-on-error: true
      - name: Architecture Review
        uses: describe
        with:
          scope: project
          mode: agent
          max-turns: 25
      - name: Code Quality Review
        uses: critique
        with:
          scope: project
          mode: agent
          focus: architecture
          max-turns: 30
